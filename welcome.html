<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Welcome</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url("college.png");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    color:white;
}

.container{
    width:90%;
    max-width:500px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(10px);

    padding:40px;

    border-radius:20px;

    text-align:center;

    box-shadow:0 10px 30px rgba(0,0,0,0.4);

    animation:fadeIn 1s ease;
}

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

h1{
    font-size:40px;
    color:#38bdf8;
    margin-bottom:15px;
}

p{
    font-size:20px;
    margin-bottom:25px;
}

button{

    padding:12px 25px;

    border:none;

    border-radius:10px;

    background:#0ea5e9;

    color:white;

    font-size:16px;

    cursor:pointer;

    transition:0.3s;
}

button:hover{

    background:#38bdf8;

    transform:scale(1.05);
}

</style>
</head>

<body>

<div class="container">

    <h1>Welcome 🎓</h1>

    <p id="welcomeText"></p>

    <button onclick="logout()">
        Logout
    </button>

</div>

<script>

let student =
localStorage.getItem("loginStudent");

document.getElementById("welcomeText").innerText =
"Hello " + student + " 👋";

function logout(){

    window.location.href = "index.html";

}

</script>

</body>
</html>
